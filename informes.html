<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Informes Ejecutivos - Dangiola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #ffffff; color: #1e293b; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .report-section { border-bottom: 2px solid #f1f5f9; padding: 3rem 0; }
        .kpi-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.5rem; }
        .kpi-value { font-size: 2rem; font-weight: 900; color: #1e3a8a; }
        .kpi-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #64748b; letter-spacing: 0.1em; }
        
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .glass-card { box-shadow: none; border: 1px solid #ccc; }
            .report-section { page-break-inside: avoid; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="w-full bg-white shadow-sm px-8 py-4 flex justify-between items-center no-print border-b">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="p-2 rounded-full hover:bg-slate-100 text-blue-900"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg></a>
            <div>
                <h1 class="text-xl font-black text-blue-950 uppercase tracking-tighter">Generador de Informes Gerenciales</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Business Intelligence Unit</p>
            </div>
        </div>
        <button onclick="window.print()" class="bg-slate-900 text-white px-6 py-2 rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-black transition-colors flex items-center space-x-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
            <span>Imprimir / PDF</span>
        </button>
    </header>

    <main class="flex-grow p-4 md:p-8 container mx-auto max-w-5xl">
        
        <div class="glass-card rounded-[2rem] p-8 mb-10 no-print">
            <h2 class="text-sm font-black text-blue-900 uppercase tracking-[0.2em] mb-6">Configuración del Informe</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Desde</label>
                    <input type="date" id="dateFrom" class="w-full border rounded-xl px-4 py-3 text-sm font-bold bg-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Hasta</label>
                    <input type="date" id="dateTo" class="w-full border rounded-xl px-4 py-3 text-sm font-bold bg-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Cliente Específico</label>
                    <select id="filterClient" class="w-full border rounded-xl px-4 py-3 text-sm font-bold bg-white focus:outline-none uppercase"><option value="ALL">TODOS LOS CLIENTES</option></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Vendedor</label>
                    <select id="filterSeller" class="w-full border rounded-xl px-4 py-3 text-sm font-bold bg-white focus:outline-none uppercase"><option value="ALL">TODO EL EQUIPO</option></select>
                </div>
            </div>
            <div class="mt-6 flex justify-end space-x-3">
                <button onclick="generarInforme()" class="bg-blue-600 text-white px-8 py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-blue-700 transition-colors shadow-lg">Ejecutar Análisis</button>
                <button onclick="exportarHTML()" class="bg-white border border-blue-200 text-blue-800 px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-blue-50 transition-colors">Exportar DOC</button>
            </div>
        </div>

        <div id="reportOutput" class="hidden bg-white shadow-2xl border border-slate-100 rounded-[2rem] p-12 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-blue-50 rounded-bl-full opacity-50 -z-10"></div>
            
            <header class="border-b-4 border-blue-900 pb-6 mb-10">
                <img src="banner.png" alt="Dangiola S.A." class="h-16 mb-6">
                <h1 class="text-4xl font-black text-slate-900 uppercase tracking-tighter leading-none mb-2">Informe Ejecutivo de Operaciones</h1>
                <p class="text-sm font-bold text-slate-500 uppercase tracking-widest" id="reportSubtitle">Reporte Consolidado</p>
                <p class="text-xs text-slate-400 mt-2 font-medium" id="reportDate"></p>
            </header>

            <div id="injectReport"></div>
        </div>
    </main>

    <script>
        /* PROMPT DE INFORME EJECUTIVO INTEGRADO:
           Análisis operativo y de volumen basado en 6 pilares:
           1. Volumen (SKU, Mix, Rotación)
           2. Dinámica de Clientes (Pareto, Retención, Churn)
           3. Geografía (Penetración, Densidad)
           4. Productividad (Ratio por Vendedor)
           5. Logística (OTIF, Lead Times)
           6. Tendencias (YoY, Estacionalidad)
        */

        let salesData = [];
        let charts = [];

        Papa.parse("ventas_con_clientes.csv", {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: function(r) { 
                salesData = r.data.map(d => {
                    let fechaRef = d.Fecha || d.EVENTO || d.Fecha_alta;
                    if (fechaRef && typeof fechaRef !== 'string') fechaRef = fechaRef.toString();
                    return {
                        ...d,
                        Vendedor: d['Vendedor 1'] ? d['Vendedor 1'].toString().trim() : (d.Vendedor ? d.Vendedor.toString().trim() : ''),
                        Nombre: d.Nombre ? d.Nombre.toString().trim() : 'Sin Nombre',
                        Modelo: d.Estructura || d.Modelo || '-',
                        m2: parseFloat(d['m2 Totales'] || d.m2 || 0),
                        Fecha: fechaRef ? fechaRef.trim() : ''
                    };
                }).filter(d => d.Nombre && d.m2 > 0 && d.Fecha);
                populateFilters();
            }
        });

        function populateFilters() {
            const clients = [...new Set(salesData.map(d => d.Nombre))].sort();
            const sellers = [...new Set(salesData.map(d => d.Vendedor))].sort();
            
            clients.forEach(c => { if(c) document.getElementById('filterClient').innerHTML += `<option value="${c}">${c}</option>`; });
            sellers.forEach(s => { if(s) document.getElementById('filterSeller').innerHTML += `<option value="${s}">${s}</option>`; });
        }

        function generarInforme() {
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;
            const client = document.getElementById('filterClient').value;
            const seller = document.getElementById('filterSeller').value;

            let filtered = salesData.filter(d => {
                let match = true;
                if(from && d.Fecha < from) match = false;
                if(to && d.Fecha > to) match = false;
                if(client !== "ALL" && d.Nombre !== client) match = false;
                if(seller !== "ALL" && d.Vendedor !== seller) match = false;
                return match;
            });

            if(filtered.length === 0) return alert("No hay datos para los filtros seleccionados.");

            document.getElementById('reportOutput').style.display = 'block';
            const target = document.getElementById('injectReport');

            // --- CÁLCULOS ---
            const totalM2 = filtered.reduce((s,a)=>s+(a.m2||0),0);
            const events = filtered.length;
            const models = filtered.reduce((a,c)=>{a[c.Modelo]=(a[c.Modelo]||0)+1; return a;},{});
            const topModel = Object.entries(models).sort((a,b)=>b[1]-a[1])[0][0];

            // Pareto
            const clientVol = filtered.reduce((a,c)=>{a[c.Nombre]=(a[c.Nombre]||0)+(c.m2||0); return a;},{});
            const sortedC = Object.entries(clientVol).sort((a,b)=>b[1]-a[1]);
            const top20Count = Math.ceil(sortedC.length * 0.2);
            const top20Vol = sortedC.slice(0, top20Count).reduce((s,a)=>s+a[1],0);
            const paretoPct = ((top20Vol / totalM2) * 100).toFixed(1);

            // Títulos
            document.getElementById('reportSubtitle').innerText = `Periodo Analizado: ${from||'Inicio'} al ${to||'Actual'} | Vista: ${client==="ALL"?'Global':client}`;
            document.getElementById('reportDate').innerText = `Generado el: ${new Date().toLocaleDateString()} a las ${new Date().toLocaleTimeString()}`;

            target.innerHTML = `
                <div class="report-section pt-0">
                    <h3 class="text-blue-900 font-black text-xs uppercase tracking-widest mb-6 border-b pb-2">1. Resumen Ejecutivo (Executive Summary)</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="kpi-box"><p class="kpi-label">Volumen Total</p><p class="kpi-value">${totalM2.toLocaleString('es-AR')}<span class="text-sm">m²</span></p></div>
                        <div class="kpi-box"><p class="kpi-label">Despliegues (Eventos)</p><p class="kpi-value">${events}</p></div>
                        <div class="kpi-box"><p class="kpi-label">Ticket Medio</p><p class="kpi-value">${(totalM2/events).toFixed(0)}<span class="text-sm">m²</span></p></div>
                        <div class="kpi-box"><p class="kpi-label">Modelo Estrella</p><p class="kpi-value text-xl leading-snug mt-2">${topModel}</p></div>
                    </div>
                    <p class="text-sm text-slate-600 leading-relaxed font-medium">El periodo analizado registra un volumen neto de <b class="text-slate-900">${totalM2.toLocaleString('es-AR')} m²</b> distribuidos en <b class="text-slate-900">${events} despliegues operativos</b>. El ticket promedio por evento se sitúa en <b>${(totalM2/events).toFixed(0)} m²</b>, indicando un enfoque en estructuras de media/alta capacidad, siendo <b>${topModel}</b> el activo de mayor rotación y rentabilidad implícita del catálogo.</p>
                </div>

                <div class="report-section">
                    <h3 class="text-blue-900 font-black text-xs uppercase tracking-widest mb-6 border-b pb-2">2. Dinámica de Clientes y Concentración de Cartera</h3>
                    <div class="flex flex-col md:flex-row gap-8 items-center">
                        <div class="w-full md:w-2/3 space-y-4 text-sm text-slate-600 leading-relaxed">
                            <p>Análisis de la regla 80/20 (Ley de Pareto). Hemos evaluado la concentración de facturación en volumen (m²) para medir el riesgo y la fidelización de la cartera activa.</p>
                            <div class="bg-slate-50 border border-slate-200 p-4 rounded-xl">
                                <p class="font-bold text-slate-800">Ratio de Concentración: <span class="text-blue-600 text-lg">${paretoPct}%</span></p>
                                <p class="text-xs mt-1">El ${paretoPct}% del volumen es traccionado por el 20% de los clientes clave (${top20Count} empresas).</p>
                            </div>
                            <p><b>Top 3 Cuentas Estratégicas (Key Accounts):</b></p>
                            <ul class="list-disc pl-5 font-bold text-slate-800">
                                ${sortedC.slice(0,3).map(c => `<li>${c[0]} (${c[1].toLocaleString()} m²)</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="report-section">
                    <h3 class="text-blue-900 font-black text-xs uppercase tracking-widest mb-6 border-b pb-2">3. Mix de Producto (Product Mix & Rotación)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                        <div>
                            <p class="text-sm text-slate-600 leading-relaxed mb-4">El análisis de rotación de activos demuestra la eficiencia del capital invertido en estructuras. A continuación, el Top 5 de modelos más demandados por cantidad de eventos, representando el "Core" operativo de la compañía.</p>
                            <table class="w-full text-left text-sm border-collapse">
                                <thead><tr class="border-b border-slate-200 text-xs uppercase text-slate-400"><th class="pb-2">Estructura</th><th class="pb-2 text-right">Eventos</th></tr></thead>
                                <tbody>
                                    ${Object.entries(models).sort((a,b)=>b[1]-a[1]).slice(0,5).map(m => `<tr class="border-b border-slate-50"><td class="py-3 font-bold text-slate-700">${m[0]}</td><td class="py-3 text-right font-black text-blue-900">${m[1]}</td></tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                        <div class="relative h-64"><canvas id="chartMix"></canvas></div>
                    </div>
                </div>

                <div class="report-section border-none pb-0">
                    <h3 class="text-blue-900 font-black text-xs uppercase tracking-widest mb-6 border-b pb-2">4. Productividad Comercial (Fuerza de Ventas)</h3>
                    <p class="text-sm text-slate-600 mb-6">Desempeño neto en metros cuadrados traccionados por representante. Visualiza la capacidad de penetración y cierre de contratos grandes.</p>
                    <div class="relative h-64 w-full"><canvas id="chartSellers"></canvas></div>
                </div>

                <div class="mt-12 bg-slate-50 p-8 rounded-3xl border border-slate-200">
                    <h3 class="text-slate-800 font-black text-sm uppercase tracking-widest mb-4">Insights Recomendados por IA</h3>
                    <ul class="space-y-3 text-sm text-slate-600 font-medium">
                        <li class="flex items-start"><svg class="w-5 h-5 text-blue-600 mr-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span><b>Fidelización:</b> Proteger los top ${top20Count} clientes que aseguran el ${paretoPct}% del flujo operativo base.</span></li>
                        <li class="flex items-start"><svg class="w-5 h-5 text-blue-600 mr-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span><b>Optimización de Activos:</b> Mantener stock preventivo crítico para la estructura ${topModel}, que lidera la rotación.</span></li>
                    </ul>
                </div>
            `;

            initCharts(models, filtered);
        }

        function initCharts(models, filtered) {
            // Mix de Producto
            const ctx1 = document.getElementById('chartMix').getContext('2d');
            new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(models).slice(0,5),
                    datasets: [{
                        data: Object.values(models).slice(0,5),
                        backgroundColor: ['#1e3a8a', '#3b82f6', '#94a3b8', '#cbd5e1', '#f1f5f9']
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
            });

            // Vendedores
            const sellerM2 = filtered.reduce((a,c)=>{ if(c.Vendedor) a[c.Vendedor]=(a[c.Vendedor]||0)+(c.m2||0); return a; }, {});
            const ctx2 = document.getElementById('chartSellers').getContext('2d');
            new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: Object.keys(sellerM2),
                    datasets: [{
                        label: 'm² Vendidos',
                        data: Object.values(sellerM2),
                        backgroundColor: '#1e3a8a',
                        borderRadius: 8
                    }]
                },
                options: { 
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false } }, y: { grid: { display: false } } }
                }
            });
        }

        function exportarHTML() {
            const content = document.getElementById('reportOutput').innerHTML;
            const fullHTML = `<html><head><script src="https://cdn.tailwindcss.com"><\/script></head><body class="p-10">${content}</body></html>`;
            const blob = new Blob([fullHTML], {type: 'text/html'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Informe_Estrategico_Dangiola.html'; a.click();
        }
    </script>
</body>
</html>
