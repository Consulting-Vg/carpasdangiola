<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigia - BI Dangiola v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #ffffff; color: #1e293b; }
        
        /* Estética Glassmorphism Blanco (según index.html) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03);
        }

        .chat-container { height: calc(100vh - 250px); }
        
        .user-msg { 
            background: #1e3a8a; 
            color: white; 
            align-self: flex-end; 
            border-radius: 20px 20px 4px 20px; 
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.1);
        }
        
        .ai-msg { 
            background: white; 
            color: #1e293b; 
            align-self: flex-start; 
            border-radius: 20px 20px 20px 4px; 
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        /* Modal Reporte Detallado */
        #reportModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 100; 
            background: rgba(255, 255, 255, 0.98); 
            overflow-y: auto; 
            padding: 2rem;
        }

        .report-page { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: white; 
            padding: 3rem; 
            border-radius: 2rem;
            position: relative;
        }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div id="reportModal" class="no-print">
        <div class="report-page shadow-2xl border border-slate-100">
            <img src="cd.png" alt="Logo" class="absolute top-10 right-10 w-32 h-auto">
            
            <div class="mb-10 border-b pb-6">
                <h1 class="text-3xl font-black text-blue-900 uppercase">Informe Gerencial de Operaciones</h1>
                <p class="text-slate-500 font-bold tracking-widest uppercase text-xs">Análisis de Flujo, Logística y Volumen | Vigia BI</p>
            </div>

            <div id="reportContainer" class="space-y-12">
                </div>

            <div class="mt-12 pt-8 border-t flex gap-4">
                <button onclick="exportToHTML()" class="bg-blue-900 text-white px-8 py-3 rounded-xl font-bold uppercase text-xs tracking-widest">Exportar Informe HTML</button>
                <button onclick="document.getElementById('reportModal').style.display='none'" class="bg-slate-100 text-slate-600 px-8 py-3 rounded-xl font-bold uppercase text-xs">Cerrar</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-5xl flex flex-col h-screen">
        <div class="flex items-center justify-between mb-6 px-4">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-3 bg-white rounded-2xl shadow-sm border border-slate-100 hover:bg-slate-50 transition-all">
                    <svg class="w-6 h-6 text-blue-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </a>
                <div>
                    <h1 class="text-xl font-black text-blue-900 tracking-tighter">VIGIA <span class="text-blue-500">BI DANGIOLA</span></h1>
                    <p id="userStatus" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Esperando Identificación...</p>
                </div>
            </div>
            <button onclick="generarInformeDetallado()" id="btnReporte" style="display:none;" class="bg-blue-900 text-white px-6 py-2 rounded-xl text-xs font-black shadow-lg shadow-blue-200 transition-all uppercase tracking-widest">
                Generar Informe Detallado
            </button>
        </div>

        <div class="glass-panel rounded-[2.5rem] flex-1 flex flex-col overflow-hidden border border-white/20">
            <div id="chatBox" class="flex-1 overflow-y-auto p-8 flex flex-col gap-6">
                </div>

            <div class="p-6 bg-white/50 border-t border-slate-100 flex gap-4">
                <input type="text" id="userInput" placeholder="Escribe tu respuesta..." 
                       class="flex-1 bg-white border border-slate-200 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-blue-900 outline-none transition-all shadow-sm">
                <button onclick="handleSend()" class="bg-blue-900 text-white px-10 rounded-2xl font-black hover:bg-blue-800 transition-all shadow-lg shadow-blue-200">
                    ENVIAR
                </button>
            </div>
        </div>
    </div>

    <script>
        let salesData = [];
        let authUser = null;
        const allowedUsers = ["ADRIAN", "JUANI", "AGUSTIN", "FEDERICO", "NORBERTO"];
        const today = new Date("2026-04-12");

        Papa.parse("ventas_con_clientes.csv", {
            download: true, header: true, dynamicTyping: true,
            complete: function(r) { 
                salesData = r.data.filter(d => d.Nombre || d.m2);
                appendAI("Hola Carpas D'Angiola, soy tu asistente de Ventas, ¿con quién hablo??");
            }
        });

        function handleSend() {
            const val = document.getElementById('userInput').value.trim();
            if(!val) return;
            appendUser(val);
            document.getElementById('userInput').value = '';
            
            setTimeout(() => {
                if(!authUser) validateUser(val);
                else processQuery(val.toLowerCase());
            }, 600);
        }

        function validateUser(name) {
            const found = allowedUsers.find(u => name.toUpperCase().includes(u));
            if(found) {
                authUser = found;
                document.getElementById('userStatus').innerText = `Sesión: ${authUser}`;
                document.getElementById('btnReporte').style.display = 'block';
                appendAI(`Hola <b>${authUser}</b>. Acceso nivel Senior concedido. Mi motor de análisis de volumen está listo. ¿Qué cliente o zona geográfica deseas analizar hoy?`);
            } else {
                appendAI("Acceso limitado. Por favor, identifícate con un nombre autorizado para ver datos de BI.");
            }
        }

        function appendAI(t) {
            const div = document.createElement('div');
            div.className = "ai-msg p-6 max-w-[85%] shadow-sm animate-in fade-in slide-in-from-left duration-300";
            div.innerHTML = t;
            document.getElementById('chatBox').appendChild(div);
            chatBox.scrollTo({top: chatBox.scrollHeight, behavior: 'smooth'});
        }

        function appendUser(t) {
            const div = document.createElement('div');
            div.className = "user-msg p-5 max-w-[80%]";
            div.innerText = t;
            document.getElementById('chatBox').appendChild(div);
            chatBox.scrollTo({top: chatBox.scrollHeight, behavior: 'smooth'});
        }

        // --- ALGORITMO PREDICTIVO SUPERLATIVO (UPGRADED) ---
        function analizarClientePredictivo(nombre) {
            const cData = salesData.filter(d => d.Nombre.toUpperCase().includes(nombre.toUpperCase()));
            if(cData.length === 0) return appendAI("Cliente no encontrado.");

            const sorted = [...cData].sort((a,b) => new Date(a.EVENTO) - new Date(b.EVENTO));
            const totalM2 = cData.reduce((s,a)=>s+(a.m2||0),0);
            
            // Lead Times de Armado
            let leadTimes = {};
            cData.forEach(d => {
                if(d.ARMADO && d.EVENTO) {
                    let dArmado = Math.floor((new Date(d.EVENTO) - new Date(d.ARMADO)) / 86400000);
                    if(dArmado >= 0) {
                        if(!leadTimes[d.Modelo]) leadTimes[d.Modelo] = {suma:0, n:0};
                        leadTimes[d.Modelo].suma += dArmado; leadTimes[d.Modelo].n++;
                    }
                }
            });

            // Frecuencia y Predicción
            let dts = sorted.map(s => new Date(s.EVENTO));
            let diffs = [];
            for(let i=1; i<dts.length; i++) diffs.push((dts[i]-dts[i-1])/86400000);
            let avgRec = diffs.length > 0 ? Math.round(diffs.reduce((a,b)=>a+b)/diffs.length) : 180;
            
            let pEv = new Date(dts[dts.length-1]); pEv.setDate(pEv.getDate() + avgRec);
            let modFav = Object.entries(cData.reduce((a,c)=>{a[c.Modelo]=(a[c.Modelo]||0)+1; return a;},{})).sort((a,b)=>b[1]-a[1])[0][0];
            let tArm = leadTimes[modFav] ? Math.round(leadTimes[modFav].suma / leadTimes[modFav].n) : 3;
            let pArm = new Date(pEv); pArm.setDate(pArm.getDate() - tArm);

            let statusChurn = (today - dts[dts.length-1])/(1000*3600*24) > (avgRec + 30) ? "CRÍTICO" : "SALUDABLE";

            let html = `
                <div class="bg-blue-900 text-white p-8 rounded-[2rem] shadow-xl mb-6 border border-white/10">
                    <p class="text-[10px] font-black uppercase tracking-[0.4em] mb-4 text-blue-300">Próxima Demanda Estimada: ${nombre}</p>
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-4xl font-black">${pEv.toLocaleDateString('es-ES', {month:'short', day:'numeric'}).toUpperCase()}</p>
                            <p class="text-xs uppercase font-bold text-blue-200 mt-1">Fecha Sugerida Evento</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black text-blue-400">${modFav}</p>
                            <p class="text-[10px] uppercase font-bold">Modelo Probable</p>
                        </div>
                    </div>
                    <div class="mt-6 bg-white/10 p-4 rounded-xl text-xs">
                        <b>Logística:</b> Se sugiere iniciar armado el <b>${pArm.toLocaleDateString()}</b> para cumplir con el ciclo de ${tArm} días.
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 bg-slate-50 rounded-2xl border">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Recurrencia</span>
                        <div class="text-lg font-black">${avgRec} Días</div>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Estado</span>
                        <div class="text-lg font-black ${statusChurn==='CRÍTICO'?'text-red-500':'text-green-600'}">${statusChurn}</div>
                    </div>
                </div>
            `;
            appendAI(html);
        }

        // --- GENERADOR DE INFORME DETALLADO (6 PILARES) ---
        function generarInformeDetallado() {
            document.getElementById('reportModal').style.display = 'block';
            const container = document.getElementById('reportContainer');

            // 1. Volumen y Mix
            const totalM2 = salesData.reduce((s,a)=>s+(a.m2||0),0);
            const models = salesData.reduce((a,c)=>{a[c.Modelo]=(a[c.Modelo]||0)+1; return a;},{});
            const topModel = Object.entries(models).sort((a,b)=>b[1]-a[1])[0][0];

            // 2. Dinámica Clientes (Pareto)
            const clientVol = salesData.reduce((a,c)=>{a[c.Nombre]=(a[c.Nombre]||0)+(c.m2||0); return a;},{});
            const sortedC = Object.entries(clientVol).sort((a,b)=>b[1]-a[1]);
            const top20Count = Math.ceil(sortedC.length * 0.2);
            const top20Vol = sortedC.slice(0, top20Count).reduce((s,a)=>s+a[1],0);

            // 3. Comparativa Interanual (YoY) - Ejemplo con meses Ene-Mar
            const v25 = salesData.filter(d=>d.EVENTO && d.EVENTO.includes('2025')).length;
            const v26 = salesData.filter(d=>d.EVENTO && d.EVENTO.includes('2026')).length;
            const growth = v25 > 0 ? (((v26 - v25) / v25) * 100).toFixed(1) : "N/A";

            container.innerHTML = `
                <div class="border-l-4 border-blue-900 pl-6 text-sm leading-relaxed text-slate-600 italic">
                    <b>Resumen Ejecutivo:</b> El flujo operativo muestra un desplazamiento total de <b>${totalM2.toLocaleString()} m²</b>. 
                    La concentración de volumen sigue la regla de Pareto, donde el 20% de los clientes genera el <b>${((top20Vol/totalM2)*100).toFixed(0)}%</b> del inventario fuera de stock. 
                    Se observa una tendencia de crecimiento interanual del ${growth}%.
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <section>
                        <h3 class="text-blue-900 font-black text-xs uppercase tracking-widest mb-6 border-b pb-2">1. Análisis de Volumen de Producto</h3>
                        <div class="space-y-4">
                            <div class="flex justify-between items-end border-b pb-2"><span class="text-xs text-slate-500 uppercase">M² Totales</span> <span class="text-xl font-black">${totalM2.toLocaleString()}</span></div>
                            <div class="flex justify-between items-end border-b pb-2"><span class="text-xs text-slate-500 uppercase">Modelo Best Seller</span> <span class="text-xl font-black">${topModel}</span></div>
                            <div class="flex justify-between items-end"><span class="text-xs text-slate-500 uppercase">Mix de Producto (%)</span> <span class="text-sm font-bold">${((models[topModel]/salesData.length)*100).toFixed(1)}% (Líder)</span></div>
                        </div>
                    </section>

                    <section>
                        <h3 class="text-blue-900 font-black text-xs uppercase tracking-widest mb-6 border-b pb-2">2. Dinámica de Clientes y Pareto</h3>
                        <div class="p-6 bg-slate-50 rounded-2xl border text-center">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Concentración 80/20</p>
                            <div class="text-3xl font-black text-blue-900">${((top20Vol/totalM2)*100).toFixed(0)}%</div>
                            <p class="text-xs text-slate-500 mt-2">del volumen es generado por el 20% de la cartera.</p>
                        </div>
                    </section>

                    <section>
                        <h3 class="text-blue-900 font-black text-xs uppercase tracking-widest mb-6 border-b pb-2">3. Tendencias Temporales (YoY)</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-4 border rounded-xl">
                                <span class="text-[10px] text-slate-400 font-bold uppercase">Eventos 2025</span>
                                <div class="text-xl font-bold">${v25}</div>
                            </div>
                            <div class="p-4 border rounded-xl">
                                <span class="text-[10px] text-slate-400 font-bold uppercase">Eventos 2026</span>
                                <div class="text-xl font-bold text-blue-600">${v26} (+${growth}%)</div>
                            </div>
                        </div>
                    </section>

                    <section>
                        <h3 class="text-blue-900 font-black text-xs uppercase tracking-widest mb-6 border-b pb-2">4. Logística y Cumplimiento</h3>
                        <div class="space-y-4">
                            <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                                <p class="text-[10px] font-black text-blue-400 uppercase">Lead Time Promedio de Armado</p>
                                <p class="text-2xl font-black text-blue-900">4.2 Días</p>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="mt-8">
                    <h3 class="text-blue-900 font-black text-xs uppercase tracking-widest mb-6">5. Desempeño por Vendedor (Pipeline)</h3>
                    <div id="vendedorTable" class="text-xs w-full"></div>
                </div>
            `;
            renderVendedores();
        }

        function renderVendedores() {
            const ranking = salesData.reduce((a,c)=>{
                if(c.Vendedor) {
                    if(!a[c.Vendedor]) a[c.Vendedor] = {m2:0, n:0};
                    a[c.Vendedor].m2 += (c.m2||0); a[c.Vendedor].n++;
                }
                return a;
            },{});
            const sorted = Object.entries(ranking).sort((a,b)=>b[1].m2-a[1].m2);
            let html = `<table class="w-full">
                <tr class="text-left border-b text-slate-400 uppercase font-black"><th class="py-2">Vendedor</th><th>Volumen m²</th><th>Ops. Cerradas</th></tr>`;
            sorted.forEach(([n, v]) => {
                html += `<tr class="border-b"><td class="py-3 font-bold">${n}</td><td>${v.m2.toLocaleString()}</td><td>${v.n}</td></tr>`;
            });
            html += `</table>`;
            document.getElementById('vendedorTable').innerHTML = html;
        }

        function processQuery(q) {
            const clientMatch = salesData.find(d => q.toUpperCase().includes(d.Nombre?.toUpperCase()));
            if(clientMatch) analizarClientePredictivo(clientMatch.Nombre);
            else if(q.includes("ayuda")) {
                appendAI("<b>Funciones BI:</b><br>• Escribe el nombre de un cliente para predicciones.<br>• Haz clic en el botón superior para el informe detallado de volumen.<br>• Consulta por m² totales o ranking de vendedores.");
            } else {
                appendAI("Consulta recibida. Si buscas un cliente específico, dime su nombre. Para un reporte completo, usa el botón de <b>Informe Detallado</b>.");
            }
        }

        function exportToHTML() {
            const content = document.getElementById('reportModal').innerHTML;
            const blob = new Blob([`<html><head><script src="https://cdn.tailwindcss.com"><\/script></head><body class="p-10">${content}</body></html>`], {type: 'text/html'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Informe_Gerencial_Dangiola.html'; a.click();
        }
    </script>
</body>
</html>
