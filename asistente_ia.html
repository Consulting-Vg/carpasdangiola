<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente IA Superlativo - Dangiola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0f4f8; color: #1e293b; overflow-x: hidden; }
        .glass-chat { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .user-msg { background: #1e3a8a; color: white; align-self: flex-end; border-radius: 1.5rem 1.5rem 0.2rem 1.5rem; box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2); }
        .ai-msg { background: white; border: 1px solid #e2e8f0; align-self: flex-start; border-radius: 1.5rem 1.5rem 1.5rem 0.2rem; }
        
        /* Animaciones del Reporte Superlativo */
        .animate-report { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #modalIA { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); padding: 2rem; overflow-y: auto; }
        .report-container { max-width: 1100px; margin: 0 auto; background: #f8fafc; border-radius: 2.5rem; overflow: hidden; position: relative; }
        
        .kpi-card { transition: transform 0.3s ease; }
        .kpi-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div id="modalIA">
        <div class="report-container shadow-2xl animate-report">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-start relative">
                <img src="cd.png" alt="Logo" class="w-24 h-auto opacity-90">
                <div class="text-right">
                    <h2 class="text-2xl font-black tracking-tighter uppercase">Inteligencia <span class="text-blue-400">Predictiva</span></h2>
                    <p class="text-[10px] font-bold text-slate-400 tracking-[0.3em]">ANÁLISIS ESTRATÉGICO DE CUENTA</p>
                </div>
                <button onclick="cerrarModalIA()" class="absolute -top-4 -right-4 bg-red-500 text-white w-10 h-10 rounded-full font-bold shadow-lg">✕</button>
            </div>

            <div id="contenidoIA" class="p-10 space-y-10">
                </div>

            <div class="p-8 bg-white border-t flex justify-center gap-4">
                <button onclick="exportarReporteHTML()" class="bg-blue-900 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-800 transition">Exportar Informe Final</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-4xl flex flex-col h-[90vh]">
        <div class="flex items-center justify-between mb-6 px-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-blue-900 rounded-2xl shadow-xl shadow-blue-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black text-blue-900">ASISTENTE <span class="text-blue-500">DANGIOLA IA</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Neural Logistics Engine</p>
                </div>
            </div>
            <button onclick="generarInformeGlobal()" class="bg-white border border-slate-200 px-5 py-2 rounded-xl text-xs font-black text-slate-600 hover:bg-slate-50 transition shadow-sm">INFORME GLOBAL 360°</button>
        </div>

        <div class="glass-chat rounded-[2.5rem] flex-1 flex flex-col overflow-hidden shadow-2xl border border-white">
            <div id="chatBox" class="flex-1 overflow-y-auto p-8 flex flex-col gap-6">
                <div class="ai-msg p-6 max-w-[85%] shadow-sm">
                    <p class="text-xs font-black text-blue-600 mb-1 uppercase tracking-tighter">Sistema de Análisis Iniciado</p>
                    <p class="text-sm font-medium leading-relaxed">
                        Hola Carpas D'Angiola. </b>.<br><br>
                        Dime el nombre de un <b>cliente</b> para ejecutar el algoritmo superlativo o consulta sobre el mix de estructuras.
                    </p>
                </div>
            </div>

            <div class="p-6 bg-white/50 backdrop-blur-sm border-t border-slate-100 flex gap-4">
                <input type="text" id="userInput" placeholder="Ej: 'Analiza a Cencosud' o 'Previsión abril'..." 
                       class="flex-1 bg-white border border-slate-200 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-blue-900 outline-none shadow-inner transition-all">
                <button onclick="handleSend()" class="bg-blue-900 text-white px-8 rounded-2xl font-black hover:bg-blue-800 transition-all shadow-lg shadow-blue-200">PROCESAR</button>
            </div>
        </div>
    </div>

    <script>
        let salesData = [];
        let clientesUnicos = [];

        Papa.parse("ventas_con_clientes.csv", {
            download: true, header: true, dynamicTyping: true,
            complete: function(results) {
                salesData = results.data.filter(d => d.Nombre);
                clientesUnicos = [...new Set(salesData.map(d => d.Nombre.toUpperCase()))];
            }
        });

        function handleSend() {
            const val = document.getElementById('userInput').value;
            if(!val) return;
            appendMessage('user', val);
            document.getElementById('userInput').value = '';
            
            setTimeout(() => {
                const detectedClient = clientesUnicos.find(c => val.toUpperCase().includes(c));
                if(detectedClient) {
                    ejecutarAnalisisAvanzadoIA(detectedClient);
                } else {
                    processChatLogic(val.toLowerCase());
                }
            }, 600);
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `${role === 'user' ? 'user-msg' : 'ai-msg'} p-5 max-w-[85%] animate-report`;
            div.innerHTML = text;
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatBox').scrollTo({top: chatBox.scrollHeight, behavior: 'smooth'});
        }

        // ==========================================
        // ALGORITMO PREDICTIVO IA SUPERLATIVO (UPGRADED)
        // ==========================================
        function ejecutarAnalisisAvanzadoIA(clienteNombre) {
            const datosCliente = salesData.filter(d => d.Nombre.toUpperCase() === clienteNombre);
            const container = document.getElementById('contenidoIA');
            
            if(datosCliente.length === 0) return;

            // 1. Cálculo de Tiempos de Armado y Lead Times
            let analisisEstructuras = {};
            let datosAsc = [...datosCliente].sort((a, b) => new Date(a.EVENTO) - new Date(b.EVENTO));
            
            datosCliente.forEach(d => {
                if(d.ARMADO && d.EVENTO) {
                    let dias = Math.floor((new Date(d.EVENTO) - new Date(d.ARMADO)) / 86400000);
                    if(dias >= 0) {
                        if(!analisisEstructuras[d.Modelo]) analisisEstructuras[d.Modelo] = { suma: 0, count: 0 };
                        analisisEstructuras[d.Modelo].suma += dias;
                        analisisEstructuras[d.Modelo].count++;
                    }
                }
            });

            // 2. Periodicidad de Compra
            let diffs = [];
            for(let i=1; i<datosAsc.length; i++) {
                let d = Math.floor((new Date(datosAsc[i].EVENTO) - new Date(datosAsc[i-1].EVENTO)) / 86400000);
                if(d > 0) diffs.push(d);
            }
            let promRecurrencia = diffs.length > 0 ? Math.round(diffs.reduce((a,b)=>a+b)/diffs.length) : 180;
            
            // Predicción Próxima Venta
            let ultimoEvento = new Date(datosAsc[datosAsc.length-1].EVENTO);
            let pEvento = new Date(ultimoEvento);
            pEvento.setDate(pEvento.getDate() + promRecurrencia);

            // Modelo Favorito y Alerta de Churn
            let modelos = {};
            datosCliente.forEach(d => modelos[d.Modelo] = (modelos[d.Modelo] || 0) + 1);
            let modFav = Object.keys(modelos).reduce((a, b) => modelos[a] > modelos[b] ? a : b);
            
            let diasPreArmado = (analisisEstructuras[modFav]) ? Math.round(analisisEstructuras[modFav].suma / analisisEstructuras[modFav].count) : 3;
            let pArmado = new Date(pEvento);
            pArmado.setDate(pArmado.getDate() - diasPreArmado);

            // Riesgo de Churn
            let diasDesdeUltimo = Math.floor((new Date("2026-04-01") - ultimoEvento) / 86400000);
            let statusChurn = diasDesdeUltimo > (promRecurrencia + 30) ? "CRÍTICO (VENCIDO)" : "SALUDABLE";

            // Renderizado de Filas de Estructuras
            let filasEstructuras = Object.keys(analisisEstructuras).map(mod => `
                <tr class="text-sm border-b border-slate-100">
                    <td class="py-4 font-bold text-slate-700">${mod}</td>
                    <td class="py-4 text-center font-black text-indigo-600 bg-indigo-50/50 rounded-xl">${(analisisEstructuras[mod].suma / analisisEstructuras[mod].count).toFixed(1)} días</td>
                    <td class="py-4 text-right text-slate-400 font-bold uppercase text-[10px]">${analisisEstructuras[mod].count} Servicios</td>
                </tr>`).join('');

            container.innerHTML = `
                <div class="space-y-10 animate-report">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-indigo-950 text-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden group">
                            <div class="absolute -right-10 -top-10 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl group-hover:bg-blue-500/20 transition-all"></div>
                            <h4 class="text-[10px] font-black uppercase tracking-[0.4em] mb-8 text-indigo-400">Próxima Demanda Proyectada</h4>
                            <div class="flex items-center justify-between mb-10">
                                <div>
                                    <p class="text-5xl font-black tracking-tighter">${pEvento.toLocaleDateString('es-ES', {month:'short', day:'numeric'}).toUpperCase()}</p>
                                    <p class="text-xs font-bold text-indigo-300 mt-2 uppercase tracking-widest">Fecha Estimada de Inicio</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-2xl font-black text-blue-400">${modFav}</p>
                                    <p class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Estructura Probable</p>
                                </div>
                            </div>
                            <div class="bg-white/5 backdrop-blur-md p-6 rounded-3xl border border-white/10">
                                <p class="text-[10px] font-black uppercase tracking-widest text-indigo-400 mb-2">Protocolo Logístico</p>
                                <p class="text-sm font-light leading-relaxed">
                                    El equipo debe iniciar movilización el día <span class="font-bold text-white">${pArmado.toLocaleDateString()}</span> para garantizar la entrega OTIF.
                                </p>
                            </div>
                        </div>

                        <div class="bg-white p-10 rounded-[3rem] border border-slate-200 shadow-sm flex flex-col justify-center space-y-6">
                            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-2">KPIs de Comportamiento</h4>
                            <div class="space-y-5">
                                <div class="flex justify-between items-center border-b border-slate-50 pb-4">
                                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Recurrencia Media</span>
                                    <span class="text-xl font-black text-slate-900">${promRecurrencia} Días</span>
                                </div>
                                <div class="flex justify-between items-center border-b border-slate-50 pb-4">
                                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Volumen Medio (m²)</span>
                                    <span class="text-xl font-black text-slate-900">${(datosCliente.reduce((a,b)=>a+(parseFloat(b.m2)||0),0)/datosCliente.length).toFixed(0)} m²</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Estado de Cuenta</span>
                                    <span class="px-3 py-1 rounded-full text-[10px] font-black ${statusChurn === 'SALUDABLE' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${statusChurn}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-10 rounded-[3rem] border border-slate-200 shadow-sm">
                        <div class="flex items-center space-x-3 mb-8">
                            <div class="w-2 h-8 bg-indigo-600 rounded-full"></div>
                            <h4 class="text-[11px] font-black text-slate-800 uppercase tracking-[0.2em]">Lead Times de Montaje por Estructura</h4>
                        </div>
                        <table class="w-full">
                            <thead>
                                <tr class="text-[10px] text-slate-400 uppercase font-black border-b border-slate-100">
                                    <th class="text-left py-4">Categoría / Modelo</th>
                                    <th class="text-center py-4">Media de Armado (Días)</th>
                                    <th class="text-right py-4">Muestreo Histórico</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${filasEstructuras || '<tr><td colspan="3" class="py-8 text-center text-slate-400">Sin datos de armado suficientes.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            abrirModalIA();
        }

        function abrirModalIA() { document.getElementById('modalIA').style.display = 'block'; }
        function cerrarModalIA() { document.getElementById('modalIA').style.display = 'none'; }

        function exportarReporteHTML() {
            const content = document.getElementById('contenidoIA').innerHTML;
            const logo = document.querySelector('.bg-slate-900 img').outerHTML;
            const fullHTML = `
                <html>
                <head>
                    <title>Reporte Inteligencia Dangiola</title>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <style>body { font-family: 'Roboto', sans-serif; padding: 60px; background: #f8fafc; }</style>
                </head>
                <body>
                    <div style="max-width: 900px; margin: 0 auto;">
                        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
                            ${logo}
                            <h1 style="font-weight: 900; text-transform: uppercase; color: #1e293b;">Informe Predictivo</h1>
                        </div>
                        ${content}
                    </div>
                </body>
                </html>`;
            
            const blob = new Blob([fullHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Reporte_IA_Dangiola.html`;
            a.click();
        }

        function processChatLogic(q) {
            if(q.includes("ayuda")) {
                appendMessage('ai', "<b>COMANDOS DISPONIBLES:</b><br>• Escribe el nombre de cualquier cliente para su análisis predictivo.<br>• 'Resumen global' para ver m² totales.<br>• 'Vendedores' para ranking comercial.");
            } else {
                appendMessage('ai', "No he detectado un cliente en tu mensaje. Por favor, escribe un nombre de cliente válido (ej: Cencosud, Toyota) para activar el motor superlativo.");
            }
        }
    </script>
</body>
</html>
