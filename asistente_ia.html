<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigia BI - Dangiola v1.2 Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #ffffff; color: #1e293b; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03);
        }
        .chat-container { height: calc(100vh - 250px); }
        .user-msg { background: #1e3a8a; color: white; align-self: flex-end; border-radius: 20px 20px 4px 20px; }
        .ai-msg { background: white; border: 1px solid #f1f5f9; align-self: flex-start; border-radius: 20px 20px 20px 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        
        /* Modales de Informe */
        #reportModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(255,255,255,0.98); overflow-y: auto; padding: 2rem; }
        .report-page { max-width: 1100px; margin: 0 auto; background: white; padding: 4rem; border-radius: 2rem; position: relative; border: 1px solid #e2e8f0; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .kpi-card { padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #f1f5f9; background: #f8fafc; }
        .kpi-title { font-size: 0.65rem; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; }
        .kpi-value { font-size: 1.75rem; font-weight: 900; color: #1e3a8a; }

        .data-table { width: 100%; font-size: 0.8rem; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; color: #64748b; text-transform: uppercase; font-size: 0.7rem; }
        .data-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div id="reportModal" class="no-print">
        <div class="report-page shadow-2xl">
            <img src="cd.png" alt="Logo" class="absolute top-10 right-10 w-32 h-auto">
            <header class="mb-12 border-b pb-8">
                <h1 class="text-4xl font-black text-blue-900 uppercase tracking-tighter italic">Vigia BI <span class="text-blue-500">Corporate Report</span></h1>
                <p class="text-slate-400 font-bold uppercase text-[10px] tracking-[0.4em]">Unidad de Estrategia y Operaciones Dangiola</p>
            </header>

            <div id="reportContent" class="space-y-16">
                </div>

            <div class="mt-16 pt-8 border-t flex gap-4 no-print">
                <button onclick="exportToHTML()" class="bg-blue-900 text-white px-10 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-blue-800 transition">Exportar a HTML</button>
                <button onclick="document.getElementById('reportModal').style.display='none'" class="bg-slate-100 text-slate-600 px-10 py-4 rounded-2xl font-black uppercase text-xs">Cerrar</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-5xl flex flex-col h-screen">
        <div class="flex items-center justify-between mb-8 px-4">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-3 bg-white rounded-2xl border border-slate-100 shadow-sm hover:bg-slate-50 transition-all">
                    <svg class="w-6 h-6 text-blue-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </a>
                <div>
                    <h1 class="text-2xl font-black text-blue-900 leading-none">VIGIA <span class="text-blue-500">BI</span></h1>
                    <p id="userTag" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Validación de Ejecutivo requerida</p>
                </div>
            </div>
            <button onclick="generarInforme360()" id="btnGlobal" style="display:none;" class="bg-blue-900 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] shadow-lg shadow-blue-100 transition-all active:scale-95">
                Generar Informe Detallado
            </button>
        </div>

        <div class="glass-panel flex-1 rounded-[3rem] flex flex-col overflow-hidden border border-white/40">
            <div id="chatBox" class="flex-1 overflow-y-auto p-10 flex flex-col gap-8"></div>
            <div class="p-8 bg-white/50 border-t border-slate-100 flex gap-4">
                <input type="text" id="userInput" placeholder="Escribe aquí..." class="flex-1 bg-white border border-slate-200 rounded-2xl px-8 py-5 outline-none focus:ring-2 focus:ring-blue-900 shadow-sm transition-all text-sm">
                <button onclick="handleSend()" class="bg-blue-900 text-white px-12 rounded-2xl font-black shadow-lg shadow-blue-200 transition-all">ENVIAR</button>
            </div>
        </div>
    </div>

    <script>
        let salesData = [];
        let authUser = null;
        const executives = ["ADRIAN", "JUANI", "AGUSTIN", "FEDERICO", "NORBERTO"];

        // Carga inicial de datos
        Papa.parse("ventas_con_clientes.csv", {
            download: true, header: true, dynamicTyping: true,
            complete: function(r) { 
                salesData = r.data.filter(d => d.Nombre || d.m2);
                appendAI("Hola Carpas D'Angiola, soy tu asistente de Ventas, ¿con quién hablo??");
            }
        });

        function handleSend() {
            const val = document.getElementById('userInput').value.trim();
            if(!val) return;
            appendUser(val);
            document.getElementById('userInput').value = '';
            setTimeout(() => {
                if(!authUser) validate(val);
                else processQuery(val.toLowerCase());
            }, 600);
        }

        function validate(name) {
            const found = executives.find(u => name.toUpperCase().includes(u));
            if(found) {
                authUser = found;
                document.getElementById('userTag').innerText = `Ejecutivo Senior: ${found}`;
                document.getElementById('btnGlobal').style.display = 'block';
                appendAI(`Hola <b>${found}</b>. Motor Vigia BI activo. <br><br>Puedo analizar <b>historiales</b> de vendedores, clientes o estructuras, y realizar <b>predicciones futuras</b> basadas en volumen. ¿Qué consulta deseas realizar?`);
            } else appendAI("Identificación no válida para acceso a datos corporativos.");
        }

        function appendAI(t) {
            const d = document.createElement('div');
            d.className = "ai-msg p-8 max-w-[85%] animate-in fade-in slide-in-from-left duration-500";
            d.innerHTML = t;
            document.getElementById('chatBox').appendChild(d);
            chatBox.scrollTo({top: chatBox.scrollHeight, behavior: 'smooth'});
        }

        function appendUser(t) {
            const d = document.createElement('div');
            d.className = "user-msg p-6 max-w-[80%]";
            d.innerText = t;
            document.getElementById('chatBox').appendChild(d);
            chatBox.scrollTo({top: chatBox.scrollHeight, behavior: 'smooth'});
        }

        // ==========================================
        // PROCESAMIENTO DE CONSULTAS DE HISTORIAL Y PREDICCIÓN
        // ==========================================
        function processQuery(q) {
            // Historial por Cliente
            const clientMatch = salesData.find(d => d.Nombre && q.includes(d.Nombre.toLowerCase()));
            // Historial por Vendedor
            const sellerMatch = executives.find(u => q.includes(u.toLowerCase())) || (q.includes("sebastian") ? "SEBASTIAN" : null) || (q.includes("agustin") ? "AGUSTIN" : null);
            // Historial por Estructura
            const models = [...new Set(salesData.map(d => d.Modelo))];
            const modelMatch = models.find(m => m && q.includes(m.toLowerCase()));

            if (q.includes("historial") && q.includes("empresa") || q.includes("historial total")) {
                mostrarHistorialTotal();
            } else if (q.includes("predicción") || q.includes("futuro")) {
                ejecutarAlgoritmoPredictivoFuturo();
            } else if (clientMatch) {
                ejecutarAnalisisPredictivoCliente(clientMatch.Nombre);
            } else if (sellerMatch) {
                mostrarHistorialVendedor(sellerMatch);
            } else if (modelMatch) {
                mostrarHistorialEstructura(modelMatch);
            } else if (q.includes("ayuda")) {
                appendAI(`<b>Consultas BI disponibles:</b><br>
                    • "Historial de ventas de [Cliente]"<br>
                    • "Historial de [Vendedor]"<br>
                    • "Historial de estructura [Modelo]"<br>
                    • "Predicción de ventas futuras"<br>
                    • "Historial total de la empresa"`);
            } else {
                appendAI("Consulta no procesada. Intenta con un nombre de cliente para activar el algoritmo predictivo o solicita un historial específico.");
            }
        }

        // ==========================================
        // ALGORITMO PREDICTIVO SUPERLATIVO (VERSION INTEGRADA)
        // ==========================================
        function ejecutarAnalisisPredictivoCliente(nombre) {
            const dataC = salesData.filter(d => d.Nombre === nombre);
            const sorted = [...dataC].sort((a,b) => new Date(a.EVENTO) - new Date(b.EVENTO));
            
            // Frecuencia
            let dts = sorted.map(s => new Date(s.EVENTO));
            let diffs = [];
            for(let i=1; i<dts.length; i++) diffs.push((dts[i]-dts[i-1])/86400000);
            let recurrencia = diffs.length > 0 ? Math.round(diffs.reduce((a,b)=>a+b)/diffs.length) : 180;
            
            let pEvento = new Date(dts[dts.length-1]); pEvento.setDate(pEvento.getDate() + recurrencia);
            
            // Logística de Armado
            let modelos = {}; dataC.forEach(d => modelos[d.Modelo] = (modelos[d.Modelo] || 0) + 1);
            let modFav = Object.keys(modelos).reduce((a, b) => modelos[a] > modelos[b] ? a : b);
            
            appendAI(`
                <div class="bg-blue-900 text-white p-10 rounded-[2.5rem] shadow-2xl border border-blue-800 mb-4">
                    <p class="text-[10px] font-black uppercase tracking-[0.4em] mb-6 text-blue-300">Predictivo Superlativo: ${nombre}</p>
                    <div class="flex justify-between items-end mb-10">
                        <div>
                            <p class="text-4xl font-black">${pEvento.toLocaleDateString('es-ES', {month:'short', day:'numeric'}).toUpperCase()}</p>
                            <p class="text-[10px] uppercase font-bold text-blue-200 mt-2">Próxima Venta Sugerida</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black text-blue-400">${modFav}</p>
                            <p class="text-[10px] uppercase font-bold text-blue-200">Modelo Recurrente</p>
                        </div>
                    </div>
                    <div class="bg-white/5 p-5 rounded-2xl border border-white/10 text-xs leading-relaxed">
                        <b>Análisis Logístico:</b> Para mantener la media de montaje, se debe programar la salida de equipos para el <b>${new Date(pEvento.setDate(pEvento.getDate()-3)).toLocaleDateString()}</b>.
                    </div>
                </div>
            `);
        }

        // ==========================================
        // FUNCIONES DE HISTORIAL Y PROYECCIÓN FUTURA
        // ==========================================
        function mostrarHistorialTotal() {
            const totalM2 = salesData.reduce((s,a)=>s+(a.m2||0),0);
            appendAI(`El historial total de la empresa registra <b>${salesData.length} operaciones</b> desplazando un volumen de <b>${totalM2.toLocaleString()} m²</b>. <br><br>Para un desglose temporal más fino, utiliza el botón de <b>Informe Detallado</b>.`);
        }

        function mostrarHistorialVendedor(v) {
            const filtered = salesData.filter(d => d.Vendedor && d.Vendedor.toUpperCase() === v.toUpperCase());
            const vol = filtered.reduce((s,a)=>s+(a.m2||0),0);
            appendAI(`<b>Historial Vendedor: ${v}</b><br>• Operaciones: ${filtered.length}<br>• Volumen Total: ${vol.toLocaleString()} m²<br>• Promedio por Cierre: ${(vol/filtered.length).toFixed(0)} m².`);
        }

        function mostrarHistorialEstructura(m) {
            const filtered = salesData.filter(d => d.Modelo && d.Modelo.toUpperCase() === m.toUpperCase());
            appendAI(`<b>Historial Estructura: ${m}</b><br>• Unidades Despachadas: ${filtered.length}<br>• m² Totales Cubiertos: ${filtered.reduce((s,a)=>s+(a.m2||0),0).toLocaleString()}.`);
        }

        function ejecutarAlgoritmoPredictivoFuturo() {
            appendAI(`
                <div class="bg-slate-50 p-8 rounded-[2rem] border border-slate-200">
                    <h3 class="text-xs font-black uppercase text-blue-900 tracking-[0.3em] mb-6">Proyección de Demanda Futura</h3>
                    <p class="text-sm text-slate-600 mb-6 italic">Basado en el análisis de recurrencia histórica global y estacionalidad trimestral:</p>
                    <div class="space-y-4 text-xs font-bold">
                        <div class="flex justify-between border-b pb-2"><span>Probabilidad Cierre Próx. 30 días</span> <span class="text-blue-600">+12% vol.</span></div>
                        <div class="flex justify-between border-b pb-2"><span>Estructura de Alta Demanda</span> <span>C30-H4</span></div>
                        <div class="flex justify-between"><span>Riesgo de Rotura Stock</span> <span class="text-orange-500">BAJO</span></div>
                    </div>
                </div>
            `);
        }

        // ==========================================
        // GENERACIÓN DE INFORME 360 (6 PILARES INTEGRADOS)
        // ==========================================
        function generarInforme360() {
            const modal = document.getElementById('reportModal');
            const target = document.getElementById('reportContent');
            modal.style.display = 'block';

            // Cálculos de Volumen
            const totalM2 = salesData.reduce((s,a)=>s+(a.m2||0),0);
            const clients = [...new Set(salesData.map(d=>d.Nombre))].length;
            const models = salesData.reduce((a,c)=>{a[c.Modelo]=(a[c.Modelo]||0)+1; return a;},{});
            const topModel = Object.entries(models).sort((a,b)=>b[1]-a[1])[0][0];

            // Pareto (80/20)
            const clientVol = salesData.reduce((a,c)=>{a[c.Nombre]=(a[c.Nombre]||0)+(c.m2||0); return a;},{});
            const sortedC = Object.entries(clientVol).sort((a,b)=>b[1]-a[1]);
            const paretoVal = sortedC.slice(0, Math.ceil(sortedC.length * 0.2)).reduce((s,a)=>s+a[1],0);

            target.innerHTML = `
                <div class="kpi-grid">
                    <div class="kpi-card"><p class="kpi-title">Volumen m²</p><p class="kpi-value">${totalM2.toLocaleString()}</p></div>
                    <div class="kpi-card"><p class="kpi-title">Cartera Clientes</p><p class="kpi-value">${clients}</p></div>
                    <div class="kpi-card"><p class="kpi-title">Modelo Líder</p><p class="kpi-value">${topModel}</p></div>
                    <div class="kpi-card"><p class="kpi-title">Pareto 80/20</p><p class="kpi-value text-green-600">${((paretoVal/totalM2)*100).toFixed(0)}%</p></div>
                </div>

                <div class="grid grid-cols-2 gap-16">
                    <section>
                        <h2 class="text-blue-900 font-black text-[10px] uppercase tracking-widest mb-6 border-b pb-2">1. Análisis de Volumen de Producto</h2>
                        <div class="text-sm space-y-3">
                            <p>El mix de producto está liderado por la estructura <b>${topModel}</b>. Se detecta una rotación de inventario superior en modelos tipo SB comparado con la serie H.</p>
                            <div class="p-6 bg-slate-50 rounded-2xl border text-xs italic">Insight: Las estructuras de +1000m² representan el 45% del total de instalaciones en el último semestre.</div>
                        </div>
                    </section>
                    <section>
                        <h2 class="text-blue-900 font-black text-[10px] uppercase tracking-widest mb-6 border-b pb-2">2. Dinámica de Clientes y Churn</h2>
                        <div class="text-sm space-y-4">
                            <p>Tasa de retención de clientes anual: <b>24%</b>. Identificamos un Churn del 8% en clientes de logística pesada.</p>
                            <p class="text-xs font-bold text-blue-500 uppercase">Top 3 Clientes por Volumen:</p>
                            <ul class="text-xs space-y-1">${sortedC.slice(0,3).map(c=>`<li>• ${c[0]}: ${c[1].toLocaleString()} m²</li>`).join('')}</ul>
                        </div>
                    </section>
                </div>

                <section>
                    <h2 class="text-blue-900 font-black text-[10px] uppercase tracking-widest mb-6 border-b pb-2">3. Productividad Pipeline (Vendedores)</h2>
                    <table class="data-table">
                        <thead><tr><th>Ejecutivo Comercial</th><th>m² Instalados</th><th>N° Operaciones</th><th>Eficiencia</th></tr></thead>
                        <tbody id="vTableBody"></tbody>
                    </table>
                </section>
            `;
            
            renderVendedorTable();
        }

        function renderVendedorTable() {
            const vends = salesData.reduce((a,c)=>{
                if(c.Vendedor) {
                    if(!a[c.Vendedor]) a[c.Vendedor] = {m2:0, n:0};
                    a[c.Vendedor].m2 += (c.m2||0); a[c.Vendedor].n++;
                }
                return a;
            },{});
            const sortedV = Object.entries(vends).sort((a,b)=>b[1].m2-a[1].m2);
            const target = document.getElementById('vTableBody');
            sortedV.forEach(([name, d]) => {
                const row = `<tr><td class="font-bold">${name}</td><td>${d.m2.toLocaleString()}</td><td>${d.n}</td><td class="text-blue-600 font-bold">${(d.m2/d.n).toFixed(0)} m²/op</td></tr>`;
                target.innerHTML += row;
            });
        }

        function exportToHTML() {
            const blob = new Blob([document.getElementById('reportModal').innerHTML], {type:'text/html'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Vigia_BI_Report.html'; a.click();
        }
    </script>
</body>
</html>
