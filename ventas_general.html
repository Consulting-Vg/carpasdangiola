<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas General - Dangiola S.A.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-white text-slate-800">
    <header class="w-full bg-white shadow-sm"><img src="banner.png" class="w-full h-auto block"></header>
    <main class="p-6 container mx-auto max-w-7xl">
        <div class="glass-panel rounded-2xl p-6 mb-8 flex flex-wrap gap-4 items-center justify-between shadow-xl">
            <h1 class="text-2xl font-black text-blue-950 uppercase tracking-tighter">Control Global</h1>
            <div class="flex flex-wrap gap-3">
                <input type="text" id="filtroCliente" placeholder="Buscar Empresa..." class="border rounded-xl px-4 py-2 text-sm font-bold uppercase">
                <input type="date" id="fIn" class="border rounded-xl px-4 py-2 text-sm">
                <input type="date" id="fOut" class="border rounded-xl px-4 py-2 text-sm">
                <button onclick="update()" class="bg-blue-900 text-white px-8 py-2 rounded-xl font-bold uppercase text-xs">Filtrar</button>
            </div>
        </div>
        <div class="glass-panel rounded-[2rem] p-8">
            <div class="overflow-x-auto overflow-y-auto max-h-[600px] custom-scrollbar rounded-xl border border-slate-100">
                <table class="w-full text-left">
                    <thead class="sticky top-0 bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                        <tr>
                            <th class="p-4">Armado</th>
                            <th class="p-4 text-blue-900">Evento</th>
                            <th class="p-4">Desarme</th>
                            <th class="p-4">Nombre Cliente</th>
                            <th class="p-4">Modelo</th>
                            <th class="p-4 text-right">m²</th>
                        </tr>
                    </thead>
                    <tbody id="body" class="text-xs divide-y bg-white"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script>
        let db = [];
        window.onload = () => {
            Papa.parse("ventas_con_clientes.csv", {
                download: true, header: true, dynamicTyping: true, skipEmptyLines: true, delimiter: ";",
                complete: (r) => { db = r.data.filter(d => d.Nombre); update(); }
            });
        };
        function update() {
            const cli = document.getElementById('filtroCliente').value.toUpperCase();
            let fil = db.filter(d => d.Nombre.toUpperCase().includes(cli)).sort((a,b)=>new Date(b.EVENTO)-new Date(a.EVENTO));
            document.getElementById('body').innerHTML = fil.map(d => `
                <tr class="hover:bg-blue-50/30">
                    <td class="p-4 font-bold text-slate-400">${d.ARMADO || '-'}</td>
                    <td class="p-4 font-black text-slate-800">${d.EVENTO || '-'}</td>
                    <td class="p-4 font-bold text-slate-400">${d.DESARME || '-'}</td>
                    <td class="p-4 font-bold text-blue-900 uppercase">${d.Nombre}</td>
                    <td class="p-4"><span class="bg-slate-100 px-2 py-1 rounded font-bold">${d.Modelo || '-'}</span></td>
                    <td class="p-4 font-black text-right text-blue-600">${parseFloat(d.m2 || 0).toLocaleString()}</td>
                </tr>`).join('');
        }
    </script>
</body>
</html>
