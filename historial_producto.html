<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Productos - Dangiola</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #ffffff; }
        .glass-panel { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .badge-carpa { display: inline-block; background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; font-weight: 900; margin: 2px; }
        .badge-si { display: inline-block; background: #ecfdf5; color: #047857; padding: 2px 6px; border-radius: 6px; font-weight: bold; font-size: 0.65rem; }
        .badge-no { display: inline-block; color: #94a3b8; font-size: 0.65rem; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col relative">

    <header class="w-full bg-white shadow-sm border-b border-slate-50">
        <img src="banner.png" alt="Banner Institucional" class="w-full h-auto block" onerror="this.style.display='none'">
        <div class="px-6 py-4 flex justify-between items-center shadow-sm relative z-50">
            <div class="flex items-center space-x-4">
                <a href="index.html" class="p-2 rounded-full hover:bg-slate-100 transition-colors text-blue-900"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg></a>
                <h1 class="text-xl font-black text-blue-900 uppercase tracking-tighter">Historial de Productos</h1>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 md:p-8 container mx-auto max-w-7xl">
        <div class="glass-panel rounded-[2rem] p-6 mb-8 flex flex-col lg:flex-row items-center justify-between gap-4 shadow-xl">
            <div class="w-full md:w-1/2">
                <label class="text-xs font-black text-blue-900 uppercase tracking-widest ml-2">Seleccionar Cliente</label>
                <select id="filtroCliente" class="w-full mt-1 border-2 border-slate-200 rounded-xl px-4 py-3 text-sm font-black text-slate-700 bg-white shadow-sm focus:border-blue-600 focus:outline-none transition-all uppercase cursor-pointer">
                    <option value="" disabled selected>SELECCIONE UNA RAZÓN SOCIAL...</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-panel rounded-[2rem] p-7 flex flex-col justify-center border-l-4 border-blue-600">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Módulos de Carpa</p>
                <p class="text-4xl font-black text-blue-900" id="kpiCarpas">0</p>
            </div>
            <div class="glass-panel rounded-[2rem] p-7 flex flex-col justify-center">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Adicional Preferido</p>
                <p class="text-xl font-black text-blue-900" id="kpiAdicional">-</p>
            </div>
            <div class="glass-panel rounded-[2rem] p-7 flex flex-col justify-center">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Último Evento</p>
                <p class="text-xl font-black text-slate-800" id="kpiUltimaFecha">-</p>
            </div>
        </div>

        <div class="glass-panel rounded-[2.5rem] p-8">
            <h3 class="text-sm font-black text-blue-900 uppercase tracking-[0.2em] mb-6">Detalle Operativo por Contrato</h3>
            <div class="overflow-x-auto overflow-y-auto max-h-[600px] custom-scrollbar rounded-xl border border-slate-100">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 z-10 bg-slate-50 text-[10px] text-slate-500 uppercase font-black">
                        <tr>
                            <th class="p-4 border-b">Fecha Evento</th>
                            <th class="p-4 border-b w-1/3">Estructuras (Carpas)</th>
                            <th class="p-4 border-b text-center">Piso</th>
                            <th class="p-4 border-b text-center">Tarima</th>
                            <th class="p-4 border-b text-center">Alfombra</th>
                            <th class="p-4 border-b text-center">Cortina</th>
                            <th class="p-4 border-b text-center">Tribuna</th>
                            <th class="p-4 border-b text-center">Silla</th>
                        </tr>
                    </thead>
                    <tbody id="tablaBody" class="text-xs text-slate-700 divide-y divide-slate-50 bg-white"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let datosCompletos = [];
        
        window.onload = () => {
            Papa.parse("ventas_con_clientes.csv", {
                download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    datosCompletos = results.data.map(d => ({
                        ...d,
                        Nombre: d.Nombre ? d.Nombre.toString().trim() : '',
                        Fecha: d.Fecha || d.EVENTO || ''
                    })).filter(d => d.Nombre && d.Fecha);

                    let clis = [...new Set(datosCompletos.map(d => d.Nombre))].sort();
                    const selector = document.getElementById('filtroCliente');
                    clis.forEach(c => { selector.innerHTML += `<option value="${c}">${c}</option>`; });
                }
            });
            document.getElementById('filtroCliente').addEventListener('change', renderCliente);
        };

        function formatAdicional(val) {
            if(!val || val === '-' || val === 0) return '<span class="badge-no">-</span>';
            return `<span class="badge-si uppercase">${val}</span>`;
        }

        function renderCliente() {
            const cliente = document.getElementById('filtroCliente').value;
            let filtrados = datosCompletos.filter(d => d.Nombre === cliente).sort((a,b) => new Date(b.Fecha) - new Date(a.Fecha));
            
            let totalCarpas = 0;
            let conteoAdicionales = { 'PISO':0, 'TARIMA':0, 'ALFOMBRA':0, 'CORTINA':0, 'TRIBUNA':0, 'SILLA':0 };

            let html = filtrados.map(d => {
                let carpas = [];
                if(d.Carpa && typeof d.Carpa === 'string') {
                    carpas = d.Carpa.split('|').map(c => c.trim()).filter(c => c);
                    totalCarpas += carpas.length;
                }
                
                if(d.PISO) conteoAdicionales.PISO++;
                if(d.TARIMA) conteoAdicionales.TARIMA++;
                if(d.ALFOMBRAS) conteoAdicionales.ALFOMBRA++;
                if(d.CORTINAS) conteoAdicionales.CORTINA++;
                if(d.TRIBUNAS) conteoAdicionales.TRIBUNA++;
                if(d.SILLAS) conteoAdicionales.SILLA++;

                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 font-black text-slate-800">${d.Fecha}</td>
                        <td class="p-4">${carpas.map(c => `<span class="badge-carpa">${c}</span>`).join(' ') || '-'}</td>
                        <td class="p-4 text-center">${formatAdicional(d.PISO)}</td>
                        <td class="p-4 text-center">${formatAdicional(d.TARIMA)}</td>
                        <td class="p-4 text-center">${formatAdicional(d.ALFOMBRAS)}</td>
                        <td class="p-4 text-center">${formatAdicional(d.CORTINAS)}</td>
                        <td class="p-4 text-center">${formatAdicional(d.TRIBUNAS)}</td>
                        <td class="p-4 text-center">${formatAdicional(d.SILLAS)}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('tablaBody').innerHTML = html;
            document.getElementById('kpiCarpas').innerText = totalCarpas;
            
            let topAdic = Object.entries(conteoAdicionales).sort((a,b)=>b[1]-a[1])[0];
            document.getElementById('kpiAdicional').innerText = topAdic[1] > 0 ? topAdic[0] : 'Ninguno';
            document.getElementById('kpiUltimaFecha').innerText = filtrados.length > 0 ? filtrados[0].Fecha : '-';
        }
    </script>
</body>
</html>
