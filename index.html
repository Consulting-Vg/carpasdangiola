<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico de Ventas - Dangiola</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
        }

        /* Definición de la clase Glassmorphism para fondo blanco */
        .glass-button {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(30, 58, 138, 0.1); /* Sombra azul institucional suave */
            border: 1px solid rgba(30, 58, 138, 0.2);
        }

        /* Estilo para los contenedores de iconos */
        .icon-container {
            background: rgba(30, 58, 138, 0.05);
            color: #1e3a8a; /* Azul Institucional Blue-900 */
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <header class="w-full bg-white overflow-hidden shadow-sm border-b border-slate-50">
        <div class="w-full h-16 md:h-24 lg:h-32">
            <img src="banner.png" alt="Banner Institucional" class="w-full h-full object-contain block">
        </div>
    </header>

    <section class="container mx-auto px-4 mt-12 text-center">
        <h1 class="text-2xl md:text-4xl font-black text-blue-900 tracking-tight uppercase">
            Dashboard Analítico de Ventas
        </h1>
        <div class="h-1 w-20 bg-blue-600 mx-auto mt-4 rounded-full"></div>
    </section>

    <main class="container mx-auto px-4 py-16 flex-grow">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">
            
            <a href="mapa.html" class="glass-button group flex flex-col items-center p-10 rounded-3xl transform hover:-translate-y-2">
                <div class="w-16 h-16 flex items-center justify-center icon-container rounded-2xl mb-6 group-hover:bg-blue-900 group-hover:text-white transition-all duration-300">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <h2 class="text-xl font-bold text-blue-900 mb-2">Mapa de Clientes</h2>
                <p class="text-slate-500 text-center text-sm font-light">Geolocalización territorial.</p>
            </a>

            <a href="ventas_general.html" class="glass-button group flex flex-col items-center p-10 rounded-3xl transform hover:-translate-y-2">
                <div class="w-16 h-16 flex items-center justify-center icon-container rounded-2xl mb-6 group-hover:bg-blue-900 group-hover:text-white transition-all duration-300">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <h2 class="text-xl font-bold text-blue-900 mb-2">Ventas General</h2>
                <p class="text-slate-500 text-center text-sm font-light">Métricas globales.</p>
            </a>

            <a href="ventas_vendedor.html" class="glass-button group flex flex-col items-center p-10 rounded-3xl transform hover:-translate-y-2">
                <div class="w-16 h-16 flex items-center justify-center icon-container rounded-2xl mb-6 group-hover:bg-blue-900 group-hover:text-white transition-all duration-300">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <h2 class="text-xl font-bold text-blue-900 mb-2">Ventas Vendedor</h2>
                <p class="text-slate-500 text-center text-sm font-light">Ranking del equipo.</p>
            </a>

            <a href="historial_cliente.html" class="glass-button group flex flex-col items-center p-10 rounded-3xl transform hover:-translate-y-2 lg:col-start-2">
                <div class="w-16 h-16 flex items-center justify-center icon-container rounded-2xl mb-6 group-hover:bg-blue-900 group-hover:text-white transition-all duration-300">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <h2 class="text-xl font-bold text-blue-900 mb-2">Historial Cliente</h2>
                <p class="text-slate-500 text-center text-sm font-light">Fichas de compra.</p>
            </a>

            <a href="asistente_ia.html" class="glass-button group flex flex-col items-center p-10 rounded-3xl transform hover:-translate-y-2">
                <div class="w-16 h-16 flex items-center justify-center icon-container rounded-2xl mb-6 group-hover:bg-blue-900 group-hover:text-white transition-all duration-300">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h2 class="text-xl font-bold text-blue-900 mb-2">Asistente IA</h2>
                <p class="text-slate-500 text-center text-sm font-light">Análisis predictivo.</p>
            </a>

        </div>
    </main>

    <footer class="mt-auto py-8 text-center text-slate-400 text-xs tracking-widest border-t border-slate-50 uppercase">
        <p>&copy; 2026 Dangiola S.A. | Inteligencia de Negocios</p>
    </footer>

</body>
</html>
